<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Passport Photo Studio (Remove.bg API)</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body {
    font-family: Arial;
    background: #222;
    color: white;
    text-align: center;
}

.box {
    max-width: 900px;
    margin: 20px auto;
    background: #333;
    padding: 20px;
    border-radius: 12px;
}

#wrapper {
    width: 100%;
    height: 500px;
    background: #111;
    margin-top: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#wrapper img {
    max-width: 100%;
    max-height: 100%;
}

button {
    padding: 12px 22px;
    margin: 8px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-weight: bold;
}

select {
    padding: 8px;
}

</style>
</head>

<body>

<div class="box">

<h2>Passport Photo Studio (API Version)</h2>

<input type="file" id="upload" accept="image/*">

<br><br>

<label>Background:</label>

<select id="bgColor">

<option value="#ff0000" selected>
Red (Primary)
</option>

<option value="#1E90FF">
Dark Sky Blue
</option>

</select>

<br>

<button onclick="removeBackgroundAPI()">
Remove Background (API)
</button>

<button onclick="generatePDF()">
Generate 8 Photos PDF
</button>

<div id="wrapper">
<img id="mainImage">
</div>

</div>

<script>

let cropper;

const mainImage =
document.getElementById("mainImage");



/* UPLOAD IMAGE */

document
.getElementById("upload")
.onchange =
function(e) {

const file =
e.target.files[0];

if (!file) return;

const reader =
new FileReader();

reader.onload =
function(event) {

mainImage.src =
event.target.result;

if (cropper)
cropper.destroy();

cropper =
new Cropper(
mainImage,
{
aspectRatio: 3.5 / 4.5,
viewMode: 1,
autoCropArea: 1
}
);

};

reader.readAsDataURL(file);

};



/* REMOVE BACKGROUND USING API */

async function removeBackgroundAPI() {

if (!cropper)
return alert("Upload image first");

const canvas =
cropper.getCroppedCanvas({
width: 1050,
height: 1350
});

canvas.toBlob(async function(blob) {

const formData =
new FormData();

formData.append(
"image_file",
blob
);

formData.append(
"size",
"auto"
);

try {

const response =
await fetch(
"https://api.remove.bg/v1.0/removebg",
{
method: "POST",

headers: {
"X-Api-Key":
"9G7JmNYuGTquBjYdvCZXjM48"
},

body:
formData
}
);

if (!response.ok) {

alert("API error");
return;

}

const resultBlob =
await response.blob();

const url =
URL.createObjectURL(
resultBlob
);



/* APPLY BACKGROUND COLOR */

const img =
new Image();

img.onload =
function() {

const bgColor =
document
.getElementById(
"bgColor"
).value;

const finalCanvas =
document.createElement(
"canvas"
);

finalCanvas.width =
img.width;

finalCanvas.height =
img.height;

const ctx =
finalCanvas.getContext(
"2d"
);

if (
bgColor !==
"transparent"
) {

ctx.fillStyle =
bgColor;

ctx.fillRect(
0,
0,
finalCanvas.width,
finalCanvas.height
);

}

ctx.drawImage(
img,
0,
0
);

mainImage.src =
finalCanvas.toDataURL();

cropper.destroy();

cropper =
new Cropper(
mainImage,
{
aspectRatio:
3.5 / 4.5,
viewMode: 1
}
);

};

img.src = url;

}

catch (error) {

alert("Connection error");

}

});

}



/* GENERATE PDF */

function generatePDF() {

if (!cropper)
return alert(
"Upload image first"
);

const canvas =
cropper.getCroppedCanvas({
width: 1050,
height: 1350
});

const imgData =
canvas.toDataURL(
"image/jpeg",
1
);

createPDF(imgData);

}



function createPDF(imgData) {

const { jsPDF } =
window.jspdf;

const doc =
new jsPDF({
orientation: "l",
unit: "in",
format: [4, 6]
});


const w = 1.38;
const h = 1.80;

const marginX = 0.10;
const marginY = 0.15;

for (let row = 0; row < 2; row++) {

for (let col = 0; col < 4; col++) {

const x =
marginX +
(col * (w + 0.1));

const y =
marginY +
(row * (h + 0.1));

doc.addImage(
imgData,
"JPEG",
x,
y,
w,
h
);

doc.setDrawColor(
0,
0,
0
);

doc.setLineWidth(
0.02
);

doc.rect(
x,
y,
w,
h
);

}

}

doc.save(
"8_passport_photos.pdf"
);

}

</script>

</body>
</html>
